# Codemagic CI/CD Configuration for Mubtakir Android App
workflows:
  android-workflow:
    name: Android Build Workflow
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      java: 17
      android_sdk: 34
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: '*'
          include: true
    scripts:
      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
      - name: Build Android App (Debug APK)
        script: |
          gradle assembleDebug
    artifacts:
      - app/build/outputs/apk/**/*.apk
    publishing:
      email:
        recipients:
          - saifabad511@gmail.com
