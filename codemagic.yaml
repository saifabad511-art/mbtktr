workflows:
  android-apk-build:
    name: Android APK Build
    max_build_duration: 60
    scripts:
      - name: Unzip and prepare files
        script: |
          echo "جاري فك ضغط ملفات المشروع..."
          unzip -o *.zip
          
          # التحقق من مكان ملفات الأندرويد ونقلها للرئيسي إذا كانت داخل مجلد فرعي
          if [ ! -f "build.gradle.kts" ] && [ ! -f "build.gradle" ]; then
            subfolder=$(find . -maxdepth 2 -name "build.gradle*" -exec dirname {} \;)
            if [ -n "$subfolder" ] && [ "$subfolder" != "." ]; then
              echo "نقل الملفات من المجلد الفرعي: $subfolder"
              cp -r $subfolder/* .
            fi
          fi
      - name: Build Android APK
        script: |
          # إذا كان ملف gradlew مفقوداً (مثل تصدير AI Studio)، نستخدم نظام gradle العام بالسيرفر
          if [ -f "gradlew" ]; then
            chmod +x gradlew
            ./gradlew assembleDebug
          else
            echo "ملف gradlew غير موجود، يتم البناء باستخدام الـ Gradle الافتراضي للسيرفر..."
            gradle assembleDebug
          fi
    artifacts:
      - app/build/outputs/apk/**/*.apk
