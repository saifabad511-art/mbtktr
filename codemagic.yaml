workflows:
  android-apk-build:
    name: Android APK Build
    max_build_duration: 60
    scripts:
      - name: Unzip and prepare files
        script: |
          echo "جاري فك ضغط ملفات المشروع..."
          unzip -o *.zip
          
          # نقل الملفات من المجلد الفرعي للرئيسي إذا كانت مستخرجة داخل مجلد
          if [ ! -f "build.gradle.kts" ] && [ ! -f "build.gradle" ]; then
            subfolder=$(find . -maxdepth 2 -name "build.gradle*" -exec dirname {} \;)
            if [ -n "$subfolder" ] && [ "$subfolder" != "." ]; then
              echo "نقل الملفات من: $subfolder"
              cp -r $subfolder/* .
            fi
          fi
      - name: Build Android APK using Project Wrapper
        script: |
          echo "بدء بناء التطبيق بالإصدار المتوافق تماماً..."
          if [ -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            java -cp gradle/wrapper/gradle-wrapper.jar org.gradle.wrapper.GradleWrapperMain assembleDebug
          else
            echo "الملف مفقود، المحاولة بالنظام الافتراضي..."
            gradle assembleDebug
          fi
    artifacts:
      - app/build/outputs/apk/**/*.apk
